<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e2e2e2;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: #141414;
      border-bottom: 2px solid #f59e0b;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .avatar {
      width: 42px; height: 42px;
      background: #f59e0b22;
      border: 2px solid #f59e0b;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: #f59e0b; }
    header p  { font-size: 0.75rem; color: #777; margin-top: 2px; }
    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 14px;
    }
    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: #4ade80;
    }
    .status-dot::before {
      content: '';
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    #build-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-size: 0.75rem;
      padding: 6px 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    #build-btn:hover:not(:disabled) { border-color: #f59e0b; color: #f59e0b; }
    #build-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #build-btn .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #build-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1e1e1e; border: 1px solid #333; border-radius: 10px;
      padding: 10px 18px; font-size: 0.82rem; color: #e2e2e2;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
      white-space: nowrap; z-index: 100;
    }
    #build-toast.show { opacity: 1; }
    #build-toast.ok  { border-color: #4ade80; color: #4ade80; }
    #build-toast.err { border-color: #f87171; color: #f87171; }

    /* ── Messages ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    .msg { display: flex; gap: 10px; max-width: 78%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0; margin-top: 2px;
    }
    .msg.bot  .msg-avatar { background: #1e1e1e; border: 1px solid #333; }
    .msg.user .msg-avatar { background: #f59e0b22; border: 1px solid #f59e0b55; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .msg.user .bubble {
      background: #f59e0b;
      color: #0d0d0d;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #1a1a1a;
      border: 1px solid #242424;
      border-bottom-left-radius: 4px;
    }

    /* ── Routine card ────────────────────────────────────── */
    .routine-card {
      margin-top: 12px;
      border: 1px solid #f59e0b33;
      border-radius: 12px;
      overflow: hidden;
      font-size: 0.85rem;
    }
    .routine-header {
      background: #f59e0b18;
      padding: 9px 14px;
      font-weight: 700;
      color: #f59e0b;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .day-block { border-top: 1px solid #222; padding: 12px 14px; }
    .day-title {
      color: #f59e0b;
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 4px;
    }
    .day-groups {
      color: #666;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .exercise-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .exercise-row:last-child { border-bottom: none; }
    .ex-name  { font-weight: 500; color: #e2e2e2; }
    .ex-notes { color: #666; font-size: 0.75rem; font-style: italic; margin-top: 2px; }
    .ex-meta  { text-align: right; color: #888; font-size: 0.8rem; white-space: nowrap; padding-left: 16px; }
    .ex-rest  { font-size: 0.7rem; color: #555; margin-top: 2px; }

    /* ── Typing indicator ────────────────────────────────── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px;
      background: #f59e0b;
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Input area ──────────────────────────────────────── */
    #input-area {
      background: #141414;
      border-top: 1px solid #1f1f1f;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 11px 18px;
      color: #e2e2e2;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input::placeholder { color: #444; }
    #msg-input:focus { border-color: #f59e0b; }
    #send-btn {
      background: #f59e0b;
      color: #0d0d0d;
      border: none;
      border-radius: 24px;
      padding: 11px 22px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled)  { background: #d97706; }
    #send-btn:active:not(:disabled) { transform: scale(0.96); }
    #send-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    /* ── Error toast ─────────────────────────────────────── */
    .error-bubble { color: #f87171; }
  </style>
</head>
<body>

  <header>
    <div class="avatar">🏋️</div>
    <div>
      <h1>K-AI</h1>
      <p>{{ usuario.objetivo }} &nbsp;·&nbsp; {{ usuario.nombre }} &nbsp;·&nbsp; {{ usuario.nivel }}</p>
    </div>
    <div class="header-right">
      <button id="build-btn" title="Rebuild vector index from docs/">⚙ Build Index</button>
      <div class="status-dot">Online</div>
    </div>
  </header>
  <div id="build-toast"></div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        ¡Hola <strong>{{ usuario.nombre }}</strong>! Soy Kai, tu entrenador personal AI.
        Puedo ayudarte con rutinas, nutrición, técnica y más.<br>
        ¿En qué puedo ayudarte hoy? 💪
      </div>
    </div>
  </div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Escribe tu pregunta…" autocomplete="off" />
    <button id="send-btn">Enviar ➤</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const input      = document.getElementById('msg-input');
    const sendBtn    = document.getElementById('send-btn');

    const scroll = () => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });

    function escapeHTML(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function appendMsg(role, innerHTML) {
      const wrap   = document.createElement('div');
      wrap.className = `msg ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'bot' ? '🤖' : '🧑';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = innerHTML;
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      scroll();
      return wrap;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.id = 'typing';
      wrap.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(wrap);
      scroll();
    }
    const removeTyping = () => document.getElementById('typing')?.remove();

    function buildRoutineHTML(data) {
      if (!data?.days?.length) return '';
      let html = '<div class="routine-card"><div class="routine-header">📋 Rutina de entrenamiento</div>';
      for (const day of data.days) {
        html += `<div class="day-block">
          <div class="day-title">🗓 ${escapeHTML(day.day)}</div>
          <div class="day-groups">${(day.muscle_groups || []).map(escapeHTML).join(' · ')}</div>`;
        for (const ex of (day.exercises || [])) {
          html += `<div class="exercise-row">
            <div>
              <div class="ex-name">${escapeHTML(ex.name)}</div>
              ${ex.notes ? `<div class="ex-notes">${escapeHTML(ex.notes)}</div>` : ''}
            </div>
            <div class="ex-meta">
              ${escapeHTML(String(ex.sets))} × ${escapeHTML(String(ex.reps))}
              <div class="ex-rest">⏱ ${escapeHTML(String(ex.rest_seconds))}s</div>
            </div>
          </div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = '';
      sendBtn.disabled = true;
      appendMsg('user', escapeHTML(text));
      showTyping();

      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: text }),
        });
        const data = await res.json();
        removeTyping();

        let html = `<p>${escapeHTML(data.message || '')}</p>`;
        if (data.intent === 'routine' && data.routine_data) {
          html += buildRoutineHTML(data.routine_data);
        }
        appendMsg('bot', html);
      } catch {
        removeTyping();
        appendMsg('bot', '<p class="error-bubble">⚠️ No se pudo conectar con el servidor.</p>');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    input.focus();

    // ── Build Index ───────────────────────────────────────────
    const buildBtn   = document.getElementById('build-btn');
    const buildToast = document.getElementById('build-toast');
    let toastTimer;

    function showToast(msg, type) {
      clearTimeout(toastTimer);
      buildToast.textContent = msg;
      buildToast.className = `show ${type}`;
      toastTimer = setTimeout(() => { buildToast.className = ''; }, 4000);
    }

    buildBtn.addEventListener('click', async () => {
      buildBtn.disabled = true;
      buildBtn.innerHTML = '<span class="spin">⟳</span> Building…';
      try {
        const res  = await fetch('/build-index', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          showToast(`✓ Index built — ${data.chunks} chunks`, 'ok');
        } else {
          showToast(`✗ ${data.error}`, 'err');
        }
      } catch {
        showToast('✗ Could not reach server', 'err');
      }
      buildBtn.disabled = false;
      buildBtn.innerHTML = '⚙ Build Index';
    });
  </script>

</body>
</html>
